<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — কলমকথা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600&family=Noto+Serif+Bengali:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #1a1208;
    --ink-soft: #3d3020;
    --ink-muted: #7a6a52;
    --ink-faint: #b8a990;
    --parchment: #faf6ef;
    --parchment-dark: #f0e9db;
    --parchment-deep: #e4d9c8;
    --gold: #b8860b;
    --rust: #8b3a1a;
  }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  /* NAV (Identical to Homepage) */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(250,246,239,0.96);
    border-bottom: 1px solid var(--parchment-deep);
    padding: 0 3rem; display: flex; align-items: center; justify-content: space-between;
    height: 64px; backdrop-filter: blur(8px);
  }
  .nav-logo {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--ink);
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    font-size: 0.9rem; color: var(--ink-muted); text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--gold); }

  /* ARTICLE CONTAINER */
  .article-container {
    max-width: 680px; /* Golden reading width for long text */
    margin: 0 auto;
    padding: 9rem 2rem 5rem; /* Spacious padding from sticky nav */
  }

  /* ARTICLE HEADER */
  .article-header {
    text-align: center;
    margin-bottom: 4rem;
  }
  .article-category {
    font-size: 0.75rem; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 1rem; display: block;
  }
  .article-title {
    font-family: 'Noto Serif Bengali', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 700; line-height: 1.3;
    color: var(--ink); margin-bottom: 1.5rem;
  }
  .article-meta {
    font-size: 0.85rem;
    color: var(--ink-muted);
    display: flex; justify-content: center; gap: 1.5rem;
    font-weight: 300;
  }
  .meta-item { display: flex; align-items: center; gap: 0.4rem; }

  /* ARTWORK / IMAGE SLIP */
  .article-featured-image {
    width: 100%; aspect-ratio: 16/9;
    background: var(--parchment-dark);
    border: 1px solid var(--parchment-deep);
    margin-bottom: 4rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-size: 0.85rem;
  }

  /* LITERARY BODY TEXT Styling */
  .article-body {
    font-size: 1.125rem; /* Slightly larger text for smooth long-form reading */
    color: var(--ink-soft);
    line-height: 2.1; /* Extra breathing space between lines */
  }
  .article-body p {
    margin-bottom: 2rem;
    text-align: justify;
  }
  
  /* Elegant Dropcap for the opening letter of the post */
  .article-body p:first-of-type::first-letter {
    font-family: 'Noto Serif Bengali', serif;
    font-size: 3.5rem; font-weight: 700;
    float: left; margin-right: 0.6rem; line-height: 1;
    color: var(--rust); padding-top: 0.2rem;
  }

  /* SIGN OFF GLYPH */
  .sign-off {
    text-align: center; color: var(--gold);
    font-family: 'Noto Serif Bengali', serif;
    font-size: 1.5rem; margin: 4rem 0;
  }

  /* FOOTER BACK LINK */
  .post-footer-nav {
    border-top: 1px solid var(--parchment-deep);
    padding-top: 2rem; display: flex; justify-content: space-between;
  }
  .back-link {
    color: var(--ink); text-decoration: none; font-size: 0.9rem;
    display: inline-flex; align-items: center; gap: 0.5rem; transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  footer {
    border-top: 1px solid var(--parchment-deep);
    padding: 3rem; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; margin-top: 5rem;
  }
  .footer-logo { font-family: 'Noto Serif Bengali', serif; font-size: 1.2rem; font-weight: 700; color: var(--ink); }
  .footer-logo span { color: var(--gold); }
  .footer-copy { font-size: 0.75rem; color: var(--ink-faint); }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">কলম<span>কথা</span></a>
  <ul class="nav-links">
    <li><a href="/#writings">লেখালেখি</a></li>
    <li><a href="/#books">বই</a></li>
    <li><a href="/#about">পরিচয়</a></li>
  </ul>
</nav>

<div class="article-container">
  <article>
    <header class="article-header">
      <span class="article-category">{{ category }}</span>
      
      <h1 class="article-title">{{ title }}</h1>
      
      <div class="article-meta">
        <span class="meta-item">📅 {{ date | date: "%d %b, %Y" }}</span>
      </div>
    </header>

    <div class="article-body">
      {{ content }}
    </div>

    <div class="sign-off">❧</div>

    <footer class="post-footer-nav">
      <a href="/archive.html" class="back-link">← সমস্ত লেখার তালিকায় ফিরুন</a>
    </footer>
  </article>
</div>

<footer>
  <div class="footer-logo">কলম<span>কথা</span></div>
  <div class="footer-copy">© ২০২৪ কলমকথা। সর্বস্বত্ব সংরক্ষিত।</div>
</footer>

</body>
</html>

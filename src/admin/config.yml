backend:
  name: github
  repo: kbiswas326/kalamkatha-website
  branch: main
  base_url: https://kalamkatha-website.pages.dev
  auth_endpoint: api/auth

media_folder: "src/images"
public_folder: "/images"

media_library:
  name: default

publish_mode: simple

collections:

  # ----------------------------
  # SETTINGS
  # ----------------------------
  - name: "settings"
    label: "⚙️ Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "site_data"
        label: "Website"
        file: "src/_data/site.json"
        fields:
          - { label: "Site Name", name: "name", widget: "string" }
          - { label: "Author", name: "author.name", widget: "string", default: "বর্ণালী দেবনাথ" }
          - { label: "Author Portrait", name: "author.portraitImage", widget: "image", required: false }

  # ----------------------------
  # STORIES
  # ----------------------------
  - name: "stories"
    label: "✍️ ছোটগল্প"
    folder: "src/posts/stories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    editor:
      preview: false

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "ছোটগল্প" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Feature Image", name: "feature", widget: "image", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # NOVELS
  # ----------------------------
  - name: "novels"
    label: "📖 উপন্যাস"
    folder: "src/posts/novels"
    create: true
    slug: "{{slug}}"
    extension: "md"

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "উপন্যাস" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Feature Image", name: "feature", widget: "image", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # POEMS
  # ----------------------------
  - name: "poems"
    label: "📝 কবিতা"
    folder: "src/posts/poems"
    create: true
    slug: "{{slug}}"
    extension: "md"

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "কবিতা" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Feature Image", name: "feature", widget: "image", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # SCREENPLAYS
  # ----------------------------
  - name: "screenplays"
    label: "🎬 চিত্রনাট্য"
    folder: "src/posts/screenplays"
    create: true
    slug: "{{slug}}"
    extension: "md"

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "চিত্রনাট্য" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Feature Image", name: "feature", widget: "image", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # ESSAYS
  # ----------------------------
  - name: "essays"
    label: "📜 প্রবন্ধ"
    folder: "src/posts/essays"
    create: true
    slug: "{{slug}}"
    extension: "md"

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "প্রবন্ধ" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Feature Image", name: "feature", widget: "image", media_folder: "posts", public_folder: "/images/posts", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }

  # ----------------------------
  # BOOKS
  # ----------------------------
  - name: "books"
    label: "📚 বই"
    folder: "src/posts/books"
    create: true
    slug: "{{slug}}"
    extension: "md"

    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Category", name: "category", widget: "hidden", default: "বই" }
      - { label: "Author", name: "author", widget: "hidden", default: "বর্ণালী দেবনাথ" }

      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }

      - { label: "Cover Image", name: "cover", widget: "image", media_folder: "books", public_folder: "/images/books", required: false }

      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

      - { label: "Tags", name: "tags", widget: "list", required: false }

      - { label: "Body", name: "body", widget: "markdown" }